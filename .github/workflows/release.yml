name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  tests:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Run syntax-critical Ruff checks
        run: python -m ruff check . --select=E9,F63,F7,F82

      - name: Run tests
        run: python -m pytest

  windows-build:
    name: Windows PyInstaller Build
    needs: tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[build]

      - name: Build Windows executable
        run: python scripts/build_binaries.py

      - name: Smoke check CLI executable
        shell: pwsh
        run: |
          .\dist\bin\roxx.exe --help
          .\dist\bin\roxx.exe service print-systemd --binary /opt/roxx/roxx-server | Select-String "Restart=always"

      - name: Smoke check server executable
        shell: pwsh
        run: |
          $env:ROXX_HOST = "127.0.0.1"
          $env:ROXX_PORT = "8765"
          $env:ROXX_SSL_REQUIRED = "false"
          $env:ROXX_AUTO_GENERATE_CERT = "false"
          $env:ROXX_LOG_LEVEL = "info"
          $env:ROXX_CONFIG_DIR = Join-Path $env:RUNNER_TEMP "roxx-config"
          $env:ROXX_DATA_DIR = Join-Path $env:RUNNER_TEMP "roxx-data"
          $env:ROXX_LOG_DIR = Join-Path $env:RUNNER_TEMP "roxx-logs"
          New-Item -ItemType Directory -Force -Path $env:ROXX_CONFIG_DIR, $env:ROXX_DATA_DIR, $env:ROXX_LOG_DIR
          $stdout = Join-Path $pwd "roxx-server-smoke.out.log"
          $stderr = Join-Path $pwd "roxx-server-smoke.err.log"
          $server = Start-Process -FilePath ".\dist\bin\roxx.exe" -ArgumentList @("server") -RedirectStandardOutput $stdout -RedirectStandardError $stderr -PassThru -WindowStyle Hidden
          try {
            Start-Sleep -Seconds 8
            try {
              $baseUrl = "http://127.0.0.1:8765"
              $response = Invoke-WebRequest -Uri "$baseUrl/livez" -UseBasicParsing -TimeoutSec 20
            } catch {
              $baseUrl = "https://127.0.0.1:8765"
              $response = Invoke-WebRequest -Uri "$baseUrl/livez" -SkipCertificateCheck -UseBasicParsing -TimeoutSec 20
            }
            if ($response.StatusCode -ne 200) {
              throw "Unexpected liveness status code: $($response.StatusCode)"
            }
            if ($response.Content -notmatch '"status"\s*:\s*"ok"') {
              throw "Unexpected liveness response: $($response.Content)"
            }
            $ready = Invoke-WebRequest -Uri "$baseUrl/readyz" -SkipCertificateCheck -UseBasicParsing -TimeoutSec 20
            if ($ready.StatusCode -ne 200) {
              throw "Unexpected readiness status code: $($ready.StatusCode)"
            }
            if ($ready.Content -notmatch '"status"\s*:\s*"ok"') {
              throw "Unexpected readiness response: $($ready.Content)"
            }
          } finally {
            if ($server) {
              Stop-Process -Id $server.Id -Force -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 2
            }
            Get-Process -Name "roxx" -ErrorAction SilentlyContinue |
              Stop-Process -Force -ErrorAction SilentlyContinue
            Get-Content $stdout -ErrorAction SilentlyContinue
            Get-Content $stderr -ErrorAction SilentlyContinue
          }

      - name: Package Windows release assets
        shell: pwsh
        run: |
          $tag = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "manual-${{ github.run_number }}" }
          $archive = "dist\roxx-windows-$tag.zip"
          Compress-Archive -Path dist\bin\roxx.exe -DestinationPath $archive -Force
          Get-ChildItem dist\bin\roxx.exe, $archive |
            Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([IO.Path]::GetFileName($_.Path))" } |
            Set-Content -Encoding ascii "dist\SHA256SUMS.txt"
          Get-Content "dist\SHA256SUMS.txt"

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: roxx-windows-build
          path: |
            dist/bin/roxx.exe
            dist/*.zip
            dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bin/roxx.exe
            dist/*.zip
            dist/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

      - name: Verify GitHub Release assets
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $expected = @(
            "roxx.exe",
            "SHA256SUMS.txt",
            "roxx-windows-$tag.zip"
          )
          $assets = gh release view $tag --json assets --jq ".assets[].name"
          $missing = $expected | Where-Object { $_ -notin $assets }
          $unexpected = $assets | Where-Object { $_ -notin $expected }
          if ($missing.Count -gt 0) {
            throw "Missing release assets: $($missing -join ', ')"
          }
          if ($unexpected.Count -gt 0) {
            throw "Unexpected release assets: $($unexpected -join ', ')"
          }
          foreach ($asset in $assets) {
            Write-Host "Published asset: $asset"
          }
