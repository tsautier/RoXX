name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  tests:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .[dev]
      - run: python -m ruff check . --select=E9,F63,F7,F82
      - run: python -m pytest

  windows-build:
    name: Windows application package
    needs: tests
    runs-on: windows-latest
    env:
      ROXX_WINDOWS_CERTIFICATE: ${{ secrets.ROXX_WINDOWS_CERTIFICATE }}
      ROXX_WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.ROXX_WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .[build]
      - run: python scripts/build_binaries.py
      - name: Authenticode sign when certificate secrets are configured
        if: env.ROXX_WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          $certificate = Join-Path $env:RUNNER_TEMP "roxx-signing.pfx"
          [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:ROXX_WINDOWS_CERTIFICATE))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Filter signtool.exe -Recurse |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found" }
          & $signtool.FullName sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $certificate /p $env:ROXX_WINDOWS_CERTIFICATE_PASSWORD dist\bin\roxx.exe
          if ($LASTEXITCODE -ne 0) { throw "Authenticode signing failed" }
          $signature = Get-AuthenticodeSignature dist\bin\roxx.exe
          if ($signature.Status -ne "Valid") { throw "Invalid Authenticode status: $($signature.Status)" }
          Remove-Item -LiteralPath $certificate -Force
      - name: Verify Windows application
        shell: pwsh
        run: |
          .\dist\bin\roxx.exe --help
          .\dist\bin\roxx.exe service print-systemd --binary /opt/roxx/roxx | Select-String "ExecStart=/opt/roxx/roxx server"
          $files = @(Get-ChildItem dist\bin -File)
          if ($files.Count -ne 1 -or $files[0].Name -ne "roxx.exe") { throw "Windows build must contain one executable" }
      - name: Smoke check Windows server and logs
        shell: pwsh
        run: |
          $env:ROXX_HOST = "127.0.0.1"
          $env:ROXX_PORT = "8765"
          $env:ROXX_SSL_REQUIRED = "false"
          $env:ROXX_AUTO_GENERATE_CERT = "false"
          $env:ROXX_CONFIG_DIR = Join-Path $env:RUNNER_TEMP "config"
          $env:ROXX_DATA_DIR = Join-Path $env:RUNNER_TEMP "data"
          $env:ROXX_LOG_DIR = Join-Path $env:RUNNER_TEMP "logs"
          New-Item -ItemType Directory -Force -Path $env:ROXX_CONFIG_DIR,$env:ROXX_DATA_DIR,$env:ROXX_LOG_DIR | Out-Null
          $stdout = Join-Path $env:RUNNER_TEMP "roxx.stdout.log"
          $stderr = Join-Path $env:RUNNER_TEMP "roxx.stderr.log"
          $server = Start-Process .\dist\bin\roxx.exe -ArgumentList server -RedirectStandardOutput $stdout -RedirectStandardError $stderr -PassThru -WindowStyle Hidden
          try {
            Start-Sleep -Seconds 8
            $live = Invoke-WebRequest http://127.0.0.1:8765/livez -UseBasicParsing
            $ready = Invoke-WebRequest http://127.0.0.1:8765/readyz -UseBasicParsing
            if ($live.StatusCode -ne 200 -or $ready.StatusCode -ne 200) { throw "Service probes failed" }
          } finally {
            Stop-Process -Id $server.Id -Force -ErrorAction SilentlyContinue
            Get-Process -Name roxx -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Get-Content $stdout -ErrorAction SilentlyContinue
            Get-Content $stderr -ErrorAction SilentlyContinue
            Get-Content (Join-Path $env:ROXX_LOG_DIR "roxx-server.log") -ErrorAction SilentlyContinue
          }
      - name: Package Windows application
        shell: pwsh
        run: |
          $tag = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "manual-${{ github.run_number }}" }
          New-Item -ItemType Directory -Force dist\windows-package | Out-Null
          Copy-Item dist\bin\roxx.exe,scripts\install_windows.ps1,scripts\uninstall_windows.ps1,scripts\upgrade_windows.ps1 dist\windows-package
          Compress-Archive -Path dist\windows-package\* -DestinationPath "dist\roxx-windows-$tag.zip" -Force
          python scripts/generate_sbom.py --artifact dist/bin/roxx.exe --output dist/roxx-windows.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            dist/bin/roxx.exe
            dist/roxx-windows-*.zip
            dist/roxx-windows.spdx.json
          if-no-files-found: error

  linux-build:
    name: Linux application packages
    needs: tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false
      - run: python -m pip install .[build]
      - name: Install nFPM
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.47.0
          sudo apt-get update
          sudo apt-get install -y rpm
      - name: Build Linux binary and packages
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          export ROXX_VERSION="$(python -c 'import roxx; print(roxx.__version__)')"
          sh scripts/build_linux_packages.sh
          cp dist/bin/roxx dist/roxx-linux-x86_64
          python scripts/generate_sbom.py --artifact dist/roxx-linux-x86_64 --output dist/roxx-linux.spdx.json
      - name: Smoke check Linux application and packages
        run: |
          dist/roxx-linux-x86_64 --help
          dist/roxx-linux-x86_64 service print-systemd --binary /usr/bin/roxx | grep 'ExecStart=/usr/bin/roxx server'
          dpkg-deb --info dist/packages/*.deb
          rpm -qip dist/packages/*.rpm
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            dist/roxx-linux-x86_64
            dist/packages/*
            dist/roxx-linux.spdx.json
          if-no-files-found: error

  publish:
    name: Publish and attest release
    if: github.ref_type == 'tag'
    needs: [windows-build, linux-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*-release"
          path: dist/release
          merge-multiple: true
      - name: Generate SHA256 checksums
        working-directory: dist/release
        run: |
          for file in roxx.exe roxx-windows-*.zip roxx-linux-x86_64 packages/* roxx-*.spdx.json; do
            hash="$(sha256sum "$file" | cut -d' ' -f1)"
            printf '%s  %s\n' "$hash" "$(basename "$file")"
          done > SHA256SUMS.txt
      - name: Attest release provenance and SBOMs
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/release/roxx.exe
            dist/release/roxx-windows-*.zip
            dist/release/roxx-linux-x86_64
            dist/release/packages/*
      - name: Attest Windows SBOM
        uses: actions/attest@v4
        with:
          subject-path: dist/release/roxx.exe
          sbom-path: dist/release/roxx-windows.spdx.json
      - name: Attest Linux SBOM
        uses: actions/attest@v4
        with:
          subject-path: dist/release/roxx-linux-x86_64
          sbom-path: dist/release/roxx-linux.spdx.json
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/roxx.exe
            dist/release/roxx-windows-*.zip
            dist/release/roxx-linux-x86_64
            dist/release/packages/*
            dist/release/roxx-*.spdx.json
            dist/release/SHA256SUMS.txt
          generate_release_notes: true
      - name: Verify release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          expected=(roxx.exe "roxx-windows-${GITHUB_REF_NAME}.zip" roxx-linux-x86_64 "roxx_${version}_amd64.deb" "roxx-${version}-1.x86_64.rpm" roxx-windows.spdx.json roxx-linux.spdx.json SHA256SUMS.txt)
          mapfile -t assets < <(gh release view "${{ github.ref_name }}" --json assets --jq '.assets[].name')
          for item in "${expected[@]}"; do printf '%s\n' "${assets[@]}" | grep -Fx "$item" >/dev/null || { echo "Missing asset: $item"; exit 1; }; done
          test "${#assets[@]}" -eq "${#expected[@]}" || { printf 'Unexpected assets: %s\n' "${assets[*]}"; exit 1; }
