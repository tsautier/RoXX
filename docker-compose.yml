services:
  roxx:
    build: .
    image: roxx:latest
    container_name: roxx
    restart: unless-stopped
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
      - "8000:8000"
    volumes:
      - ./config:/etc/roxx
      - roxx_data:/var/lib/roxx
      - roxx_logs:/var/log/roxx
      # Map FreeRADIUS config if customization is needed
      # - ./freeradius:/etc/freeradius/3.0
    environment:
      - TZ=UTC
      - ROXX_CONFIG_DIR=/etc/roxx
      - ROXX_DATA_DIR=/var/lib/roxx
      - ROXX_LOG_DIR=/var/log/roxx
      - ROXX_SECURITY_PROFILE=production
      - ROXX_SECRET_KEY=${ROXX_SECRET_KEY:?Set ROXX_SECRET_KEY}
    healthcheck:
      test: ["CMD", "curl", "--fail", "--insecure", "https://127.0.0.1:8000/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  roxx_data:
  roxx_logs:
