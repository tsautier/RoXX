{% extends "base.html" %}

{% block title %}User Management - RoXX{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">RADIUS Users (Local)</h1>
        <button class="btn btn-primary" data-toggle="modal" data-target="#addUserModal">
            <i class="fas fa-plus fa-sm text-white-50"></i> Add User
        </button>
    </div>

    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">Local Users Configuration (`users.conf`)</h6>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered" width="100%" cellspacing="0">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Attribute</th>
                            <th>Operation</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add User Modal -->
<div class="modal fade" id="addUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Local RADIUS User</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <div class="modal-body">
                <form id="addUserForm">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Password (Cleartext)</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="addUser()">Save User</button>
            </div>
        </div>
    </div>
</div>

<script>
async function loadUsers() {
    const response = await fetch('/api/users');
    const users = await response.json();
    const body = document.getElementById('usersTableBody');
    body.innerHTML = '';
    users.forEach(u => {
        body.innerHTML += `
            <tr>
                <td>${u.username}</td>
                <td>${u.attribute}</td>
                <td>${u.op}</td>
                <td>
                    <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.username}')">Delete</button>
                </td>
            </tr>
        `;
    });
}

async function addUser() {
    const formData = new FormData(document.getElementById('addUserForm'));
    const data = Object.fromEntries(formData.entries());
    const response = await fetch('/api/users', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    if (response.ok) {
         $('#addUserModal').modal('hide');
         loadUsers();
    }
}

async function deleteUser(username) {
    if (confirm(`Delete user ${username}?`)) {
        await fetch(`/api/users/${username}`, { method: 'DELETE' });
        loadUsers();
    }
}

window.onload = loadUsers;
</script>
{% endblock %}
